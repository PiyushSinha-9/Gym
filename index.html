<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Paglu</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a09;
      --panel: #111412;
      --panel-2: #171b18;
      --panel-3: #20251f;
      --text: #f5f7f0;
      --muted: #a9b1a7;
      --dim: #737c72;
      --line: rgba(255, 255, 255, 0.1);
      --line-strong: rgba(255, 255, 255, 0.18);
      --green: #9df05b;
      --teal: #47d7c6;
      --amber: #f4be4f;
      --red: #ff6b6b;
      --steel: #9ca7ff;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.42);
      --radius: 8px;
      --max: 1180px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body[data-theme="volt"] {
      --bg: #080a09;
      --panel: #111412;
      --panel-2: #171b18;
      --panel-3: #20251f;
      --text: #f5f7f0;
      --muted: #a9b1a7;
      --dim: #737c72;
      --green: #9df05b;
      --teal: #47d7c6;
      --amber: #f4be4f;
      --steel: #9ca7ff;
    }

    body[data-theme="ember"] {
      --bg: #0e0a08;
      --panel: #17120f;
      --panel-2: #211914;
      --panel-3: #2c2119;
      --text: #fff7ed;
      --muted: #d2bca5;
      --dim: #947e68;
      --green: #ffb84d;
      --teal: #ff6b4a;
      --amber: #f4df7a;
      --steel: #ffc0a8;
    }

    body[data-theme="ocean"] {
      --bg: #061014;
      --panel: #0c171c;
      --panel-2: #101f26;
      --panel-3: #172a33;
      --text: #f0fbff;
      --muted: #a8c3ca;
      --dim: #6f8c95;
      --green: #68e1fd;
      --teal: #7cf7c5;
      --amber: #f7d46a;
      --steel: #94b8ff;
    }

    body[data-theme="mono"] {
      --bg: #090909;
      --panel: #121212;
      --panel-2: #1b1b1b;
      --panel-3: #242424;
      --text: #f6f6f3;
      --muted: #b7b7ae;
      --dim: #818178;
      --green: #ffffff;
      --teal: #cfcfc8;
      --amber: #9df05b;
      --steel: #d7d7d0;
    }

    body[data-theme="aurora"] {
      --bg: #07090f;
      --panel: #10131c;
      --panel-2: #171b27;
      --panel-3: #222638;
      --text: #f8fbff;
      --muted: #bbc7d7;
      --dim: #808da3;
      --green: #9cffb7;
      --teal: #78e7ff;
      --amber: #f7a8ff;
      --steel: #b9c2ff;
    }

    body[data-theme="royal"] {
      --bg: #090811;
      --panel: #12101d;
      --panel-2: #1a1628;
      --panel-3: #261f39;
      --text: #fbf8ff;
      --muted: #c6bbd8;
      --dim: #8c7fa4;
      --green: #ffd166;
      --teal: #8bd3ff;
      --amber: #f78fb3;
      --steel: #c7a9ff;
    }

    body[data-theme="forge"] {
      --bg: #0b0b0a;
      --panel: #151513;
      --panel-2: #1f1e1a;
      --panel-3: #2b2922;
      --text: #fffaf0;
      --muted: #c8c0af;
      --dim: #8d8372;
      --green: #f2c14e;
      --teal: #67d6c2;
      --amber: #ff7a59;
      --steel: #c2d3ff;
    }

    body[data-theme="ice"] {
      --bg: #071012;
      --panel: #0f191d;
      --panel-2: #152229;
      --panel-3: #1e3039;
      --text: #f3fdff;
      --muted: #adc9d0;
      --dim: #78939b;
      --green: #d7fbff;
      --teal: #70f4d6;
      --amber: #f5d875;
      --steel: #83aaff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--green) 10%, transparent), transparent 32%),
        linear-gradient(225deg, color-mix(in srgb, var(--amber) 8%, transparent), transparent 28%),
        linear-gradient(180deg, var(--panel) 0%, var(--bg) 42%, color-mix(in srgb, var(--bg) 78%, black) 100%);
      color: var(--text);
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(18px);
    }

    .header-inner {
      display: grid;
      gap: 14px;
      padding: 16px 0 12px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      position: relative;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid color-mix(in srgb, var(--green) 46%, transparent);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--green) 28%, transparent), color-mix(in srgb, var(--teal) 16%, transparent)),
        var(--panel-2);
      box-shadow: 0 0 28px color-mix(in srgb, var(--green) 18%, transparent);
      color: var(--green);
      font-size: 0.86rem;
      font-weight: 950;
      letter-spacing: 0;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      bottom: 9px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), var(--teal), var(--amber));
      box-shadow: 0 0 18px color-mix(in srgb, var(--green) 28%, transparent);
    }

    .brand-mark span {
      position: relative;
      z-index: 1;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .theme-menu {
      position: relative;
      flex: 0 0 auto;
    }

    .theme-menu summary {
      list-style: none;
    }

    .theme-menu summary::-webkit-details-marker {
      display: none;
    }

    .theme-trigger {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }

    .theme-trigger small,
    .theme-option small {
      display: block;
      color: var(--dim);
      font-size: 0.64rem;
      font-weight: 850;
      text-transform: uppercase;
      line-height: 1;
    }

    .theme-trigger strong {
      display: block;
      margin-top: 3px;
      font-size: 0.82rem;
      line-height: 1;
      white-space: nowrap;
    }

    .theme-current-swatch,
    .theme-swatch {
      width: 26px;
      height: 26px;
      border: 1px solid var(--line-strong);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--dot-a), var(--dot-b));
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.16);
    }

    .theme-current-swatch {
      --dot-a: var(--green);
      --dot-b: var(--teal);
    }

    .theme-chevron {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
      transition: transform 160ms ease;
    }

    .theme-menu[open] .theme-chevron {
      transform: rotate(180deg);
    }

    .theme-options {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 80;
      width: min(286px, calc(100vw - 24px));
      max-height: min(68vh, 460px);
      overflow: auto;
      padding: 8px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel-2) 96%, black);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.56);
    }

    .theme-option {
      width: 100%;
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }

    .theme-option:hover,
    .theme-option.active {
      border-color: color-mix(in srgb, var(--green) 32%, transparent);
      background: color-mix(in srgb, var(--green) 10%, transparent);
    }

    .theme-option strong {
      display: block;
      font-size: 0.88rem;
      line-height: 1.1;
    }

    .theme-option .active-mark {
      color: var(--green);
      opacity: 0;
    }

    .theme-option.active .active-mark {
      opacity: 1;
    }

    .view-toggle {
      display: flex;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius);
    }

    .view-toggle button,
    .day-tab,
    .primary-btn,
    .ghost-btn,
    .timer-btn,
    .icon-btn {
      border: 0;
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .view-toggle button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 11px;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .view-toggle button.active {
      background: rgba(157, 240, 91, 0.14);
      color: var(--green);
    }

    .day-strip-wrap {
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .day-strip-wrap::-webkit-scrollbar {
      display: none;
    }

    .day-strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(142px, 1fr);
      gap: 8px;
      min-width: max-content;
    }

    .day-tab {
      position: relative;
      display: grid;
      gap: 5px;
      text-align: left;
      padding: 11px 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.045);
      min-height: 72px;
    }

    .day-tab:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.07);
    }

    .day-tab.active {
      border-color: rgba(157, 240, 91, 0.58);
      background:
        linear-gradient(135deg, rgba(157, 240, 91, 0.18), rgba(71, 215, 198, 0.08)),
        rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 0 0 1px rgba(157, 240, 91, 0.12);
    }

    .day-tab .day {
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .day-tab .focus {
      font-size: 0.74rem;
      color: var(--muted);
      line-height: 1.25;
    }

    .day-tab .mini-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
    }

    .day-tab .mini-progress span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), var(--teal));
    }

    main {
      padding: 22px 0 42px;
    }

    .hero {
      display: grid;
      gap: 16px;
      margin-bottom: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(157, 240, 91, 0.14), rgba(71, 215, 198, 0.06) 46%, rgba(244, 190, 79, 0.08)),
        rgba(17, 20, 18, 0.92);
      box-shadow: var(--shadow);
    }

    .hero-grid {
      display: grid;
      gap: 16px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: fit-content;
      margin-bottom: 10px;
      padding: 6px 8px;
      border: 1px solid rgba(157, 240, 91, 0.32);
      background: rgba(157, 240, 91, 0.09);
      color: var(--green);
      border-radius: var(--radius);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(1.7rem, 6vw, 3.4rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .hero-copy {
      margin: 12px 0 0;
      color: #d8ded5;
      line-height: 1.55;
      max-width: 760px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat-card,
    .panel,
    .exercise-card,
    .progress-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17, 20, 18, 0.88);
    }

    .stat-card {
      padding: 12px;
    }

    .stat-label {
      color: var(--dim);
      font-size: 0.72rem;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stat-value {
      margin-top: 7px;
      color: var(--text);
      font-weight: 800;
      line-height: 1.25;
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .bar {
      height: 10px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      border-radius: var(--radius);
    }

    .bar span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--teal), var(--amber));
      transition: width 220ms ease;
    }

    .content-grid {
      display: grid;
      gap: 14px;
    }

    .panel {
      padding: 16px;
    }

    .panel h3,
    .section-title {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .panel p {
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.045);
      border-radius: var(--radius);
      color: #d9dfd6;
      font-size: 0.8rem;
      line-height: 1.15;
    }

    .chip.good {
      border-color: rgba(157, 240, 91, 0.3);
      color: var(--green);
      background: rgba(157, 240, 91, 0.08);
    }

    .chip.warn {
      border-color: rgba(244, 190, 79, 0.34);
      color: var(--amber);
      background: rgba(244, 190, 79, 0.08);
    }

    .list {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .list li {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      color: #d8ded5;
      line-height: 1.45;
    }

    .list li::before {
      content: "";
      flex: 0 0 auto;
      width: 7px;
      height: 7px;
      margin-top: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 14px rgba(157, 240, 91, 0.35);
    }

    .warmup-visual-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 9px;
      margin-top: 14px;
    }

    .warmup-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .warmup-card img {
      display: block;
      width: 100%;
      height: 112px;
      object-fit: contain;
      background: #eef2ec;
      border-bottom: 1px solid var(--line);
    }

    .warmup-card-body {
      display: grid;
      gap: 5px;
      padding: 9px;
    }

    .warmup-card strong {
      font-size: 0.82rem;
      line-height: 1.2;
    }

    .warmup-card span {
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.25;
    }

    .warmup-video {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      width: fit-content;
      margin-top: 3px;
      color: var(--green);
      font-size: 0.72rem;
      font-weight: 850;
    }

    .exercise-list {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .exercise-card {
      overflow: hidden;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.28);
    }

    .exercise-top {
      display: grid;
      gap: 0;
    }

    .exercise-visual {
      min-height: 210px;
      background: #eef2ec;
      border-bottom: 1px solid var(--line);
    }

    .exercise-visual img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 210px;
      object-fit: contain;
      background: #eef2ec;
    }

    .exercise-body {
      padding: 15px;
      display: grid;
      gap: 14px;
    }

    .exercise-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .exercise-title-row h3 {
      margin: 0;
      font-size: 1.08rem;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .complete {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .complete input {
      width: 20px;
      height: 20px;
      accent-color: var(--green);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius);
    }

    .metric span:first-child {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--dim);
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric span:last-child {
      font-weight: 850;
      color: var(--text);
    }

    .detail-grid {
      display: grid;
      gap: 11px;
    }

    .detail-block {
      padding-top: 2px;
    }

    .detail-block h4 {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 0 0 6px;
      color: #ecf2e8;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .detail-block p,
    .detail-block li {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .detail-block ul {
      margin: 0;
      padding-left: 18px;
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .primary-btn,
    .ghost-btn,
    .timer-btn,
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 12px;
      font-weight: 800;
      font-size: 0.86rem;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--green), #65d67a);
      color: #081008;
    }

    .ghost-btn,
    .timer-btn,
    .icon-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
    }

    .primary-btn:hover,
    .ghost-btn:hover,
    .timer-btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
    }

    .timer-btn.running {
      border-color: rgba(244, 190, 79, 0.44);
      color: var(--amber);
      background: rgba(244, 190, 79, 0.08);
    }

    .icon-btn {
      width: 42px;
      padding: 10px;
    }

    .timer-reset-btn {
      min-width: 112px;
    }

    .celebration-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 38%, color-mix(in srgb, var(--green) 22%, transparent), transparent 34%),
        radial-gradient(circle at 20% 18%, color-mix(in srgb, var(--teal) 18%, transparent), transparent 28%),
        radial-gradient(circle at 85% 75%, color-mix(in srgb, var(--amber) 20%, transparent), transparent 34%),
        rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(14px);
      animation: fadeIn 180ms ease;
    }

    .celebration-stage {
      position: absolute;
      inset: 0;

      gap: 12px;

      text-align: center;
      padding: 24px 16px;
      border: 1px solid color-mix(in srgb, var(--green) 34%, transparent);

      font-weight: 950;

      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;

      margin: 0;
      color: #e6ece4;
      line-height: 1.45;
      font-size: 0.98rem;

      margin-top: 4px;
      min-width: 126px;
      border-color: color-mix(in srgb, var(--green) 34%, transparent);
      background: color-mix(in srgb, var(--green) 12%, transparent);
    }

    .confetti,
    .spark,
    .balloon,
    .firework,
    .ringwave,
    .plate-shard,
    .speed-line,
    .spotlight,
    .starburst {
      position: absolute;
      pointer-events: none;
    }

    .confetti {
      left: var(--x);
      top: -12vh;
      width: 9px;
      height: 18px;
      border-radius: 3px;
      background: var(--c);
      transform: rotate(var(--r));
      animation: confettiFall var(--d) linear var(--delay) infinite;
    }

    .balloon {
      left: var(--x);
      bottom: -16vh;
      width: clamp(34px, 9vw, 74px);
      height: clamp(46px, 12vw, 96px);
      border-radius: 50% 50% 46% 46%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.72), transparent 16%),
        linear-gradient(145deg, var(--c), color-mix(in srgb, var(--c) 58%, black));
      box-shadow: inset -8px -16px 26px rgba(0, 0, 0, 0.18), 0 16px 40px rgba(0, 0, 0, 0.22);
      animation: balloonLift var(--d) ease-in var(--delay) infinite;
    }

    .balloon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 96%;
      width: 1px;
      height: 70px;
      background: color-mix(in srgb, var(--c) 46%, white);
      transform: translateX(-50%);

    .spark {
      left: var(--x);
      top: var(--y);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--c);
      box-shadow: 0 0 18px var(--c);
      animation: sparkle 1100ms ease-in-out var(--delay) infinite;
    }

    .firework {
      left: var(--x);
      top: var(--y);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--c);
      box-shadow:
        0 -48px 0 var(--c),
        34px -34px 0 var(--c),
        48px 0 0 var(--c),
        34px 34px 0 var(--c),
        0 48px 0 var(--c),
        -34px 34px 0 var(--c),
        -48px 0 0 var(--c),
        -34px -34px 0 var(--c);
      animation: fireworkPop 1300ms ease-out var(--delay) infinite;
    }

    .ringwave {
      left: 50%;
      top: 50%;
      width: var(--size);
      height: var(--size);
      border: 2px solid var(--c);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.2);
      animation: ringPulse 1700ms ease-out var(--delay) infinite;
    }

    .plate-shard {
      left: 50%;
      top: 50%;
      width: 18px;
      height: 58px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--c), color-mix(in srgb, var(--c) 42%, black));
      transform-origin: 50% 220px;
      animation: plateBurst 1350ms ease-out var(--delay) infinite;
    }

    .barbell-celebration {
      position: absolute;
      left: 50%;
      bottom: 12vh;
      width: min(70vw, 520px);
      height: 78px;
      transform: translateX(-50%);
      animation: barbellBounce 1500ms ease-in-out infinite;
    }

    .barbell-celebration::before {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: 35px;
      height: 9px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal), var(--text), var(--green));
      box-shadow: 0 0 28px color-mix(in srgb, var(--green) 28%, transparent);

    .barbell-celebration span {
      position: absolute;
      top: 15px;

      height: 48px;

    .barbell-celebration .right-a { right: 2%; }
    .barbell-celebration .right-b { right: 8%; background: var(--green); }

    .speed-line {
      left: -22vw;
      top: var(--y);
      width: 22vw;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--c));
      animation: speedSweep var(--d) linear var(--delay) infinite;
    }

    .spotlight {
      bottom: -8vh;
      width: 46vw;
      height: 86vh;
      background: linear-gradient(0deg, color-mix(in srgb, var(--c) 24%, transparent), transparent 74%);
      clip-path: polygon(44% 100%, 56% 100%, 100% 0, 0 0);
      opacity: 0.62;
      transform-origin: bottom center;
      animation: spotlightMove 2500ms ease-in-out var(--delay) infinite alternate;
    }

    .starburst {
      left: var(--x);
      top: var(--y);
      width: 12px;
      height: 12px;
      background: var(--c);
      clip-path: polygon(50% 0, 60% 38%, 100% 50%, 60% 62%, 50% 100%, 40% 62%, 0 50%, 40% 38%);
      box-shadow: 0 0 18px var(--c);
      animation: starSpin 1500ms ease-in-out var(--delay) infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes copyRise {
      from { opacity: 0; transform: translate(-50%, -45%) scale(0.94); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes confettiFall {
      from { transform: translate3d(0, -12vh, 0) rotate(0deg); opacity: 1; }
      to { transform: translate3d(var(--drift), 118vh, 0) rotate(720deg); opacity: 0.92; }

    @keyframes balloonLift {
      from { transform: translate3d(0, 0, 0) rotate(-4deg); opacity: 0; }

      to { transform: translate3d(var(--drift), -128vh, 0) rotate(7deg); opacity: 0.92; }
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(0.4); opacity: 0.25; }
      50% { transform: scale(1.8); opacity: 1; }
    }

    @keyframes fireworkPop {
      0% { transform: scale(0.12) rotate(0deg); opacity: 0; }
      18% { opacity: 1; }
      100% { transform: scale(1.32) rotate(55deg); opacity: 0; }
    }

    @keyframes ringPulse {
      0% { opacity: 0.82; transform: translate(-50%, -50%) scale(0.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.36); }
    }

    @keyframes plateBurst {
      0% { opacity: 0; transform: rotate(var(--r)) translateY(0) scale(0.45); }

      100% { opacity: 0; transform: rotate(var(--r)) translateY(-210px) scale(1); }

      50% { transform: translateX(-50%) translateY(-18px) rotate(1deg); }
    }

    @keyframes speedSweep {
      from { transform: translateX(0); opacity: 0; }
      15% { opacity: 1; }
      to { transform: translateX(145vw); opacity: 0; }
    }

    @keyframes spotlightMove {
      from { transform: translateX(var(--x)) rotate(var(--r1)); }
      to { transform: translateX(var(--x)) rotate(var(--r2)); }
    }

    @keyframes starSpin {
      0%, 100% { opacity: 0.2; transform: scale(0.7) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.7) rotate(180deg); }
    }

      stroke-linecap: round;

      fill: none;
      flex: 0 0 auto;

      height: 14px;
    }

    .muted {

    }

    @media (min-width: 720px) {

        padding: 18px 0 14px;
      }

        padding: 24px;
      }

      .hero-grid {
        grid-template-columns: 1.45fr 0.8fr;
        align-items: end;
      }

      .content-grid {
        grid-template-columns: 0.92fr 1.08fr;
      }

        grid-template-columns: 0.42fr 0.58fr;
      }

      .exercise-visual {
        border-bottom: 0;
        border-right: 1px solid var(--line);
      }

      .metric-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .detail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .actions {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
    }

    @media (min-width: 1020px) {
      .brand h1 {
        font-size: 1.2rem;
      }

      .day-strip {
        min-width: 0;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        grid-auto-flow: row;
      }

      .day-tab {
        min-height: 82px;
      }
    }

    @media (max-width: 430px) {
      .shell {
        width: min(100% - 20px, var(--max));
      }

        gap: 10px;
        padding: 10px 0 8px;

      .brand-mark {
        width: 38px;
        height: 38px;

        font-size: 1rem;
      }

        display: none;
      }

      .theme-trigger {
        min-height: 38px;
        padding: 7px 8px;
      }

      .theme-trigger small {
        display: none;
      }

        margin-top: 0;
        font-size: 0.78rem;
      }

      .theme-current-swatch {
        width: 23px;
        height: 23px;
      }

      .day-strip {
        grid-auto-columns: minmax(112px, 1fr);
      }

      .day-tab {
        min-height: 62px;
        padding: 9px 10px;
      }

      .exercise-title-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .complete {
        white-space: normal;
      }
    }

    @media (max-width: 620px) {
      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .button-row .primary-btn {
        grid-column: 1 / -1;
      }

      .timer-btn,
      .timer-reset-btn,
      .button-row .primary-btn {
        width: 100%;
      }
    }
  </style>

        message: "No skipped work. Recover and come back sharp."
      },
      {
        type: "barbell",
        title: "Strength Banked",
        message: "Controlled reps, logged effort, job done."
      },
      {
        type: "speed",
        title: "Athlete Mode",
        message: "Session complete. Keep that pace outside the gym."
      },
      {
        type: "plates",
        title: "Hundred Percent",
        message: "All blocks complete. Good discipline."
      },
      {
        type: "spotlight",
        title: "Main Event Done",
        message: "Workout finished. Shut it down and recover."
      }
    ];

    function warmupMove(name, cue, image) {
      return {
        id: slug(name),
        name,
        cue,
        image,
        videoQuery: `${name} proper form`
      };
    }

    function exercise(name, sets, reps, rest, rpe, timerSeconds, visual, targets, description, mistakes, wristNote, alternatives) {
      return {
        id: slug(name),
        name,
        sets,
        reps,
        rest,
        rpe,
        timerSeconds,
        visual,
        targets,
        description,
        mistakes,
        wristNote,
        alternatives,
        videoQuery: `${name} proper form`
      };
    }

    function renderWarmupCards(warmup) {
      if (!warmup.visuals || !warmup.visuals.length) return "";
      return `
        <div class="warmup-visual-grid">
          ${warmup.visuals.map(move => {
            const fallback = warmupFallbackDataUrl(move);
            const image = move.image || fallback;
            const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(move.videoQuery)}`;
            return `
              <article class="warmup-card">
                <img src="${escapeAttr(image)}" data-fallback="${escapeAttr(fallback)}" onerror="this.onerror=null;this.src=this.dataset.fallback;" alt="${escapeAttr(move.name)} warm-up image" loading="lazy" decoding="async" referrerpolicy="no-referrer" />
                <div class="warmup-card-body">
                  <strong>${move.name}</strong>
                  <span>${move.cue}</span>
                  <a class="warmup-video" href="${url}" target="_blank" rel="noopener noreferrer">${icons.video} Form</a>
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function slug(value) {
      return value.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    const allDays = [...days, sunday];
    const storagePrefix = "athletic-gym-companion-v1";
    const dayStrip = document.getElementById("dayStrip");
    const app = document.getElementById("app");
    const themeMenu = document.getElementById("themeMenu");
    const themeOptions = document.getElementById("themeOptions");
    const themeLabel = document.getElementById("themeLabel");
    const themeCurrentSwatch = document.getElementById("themeCurrentSwatch");

    let selectedDayId = localStorage.getItem(`${storagePrefix}:selectedDay`) || getTodayId();
    let selectedTheme = localStorage.getItem(`${storagePrefix}:theme`) || "volt";
    let timerIntervals = {};

    function getTodayId() {
      const ids = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
      return ids[new Date().getDay()];
    }

    function getDay(dayId) {
      return allDays.find(day => day.id === dayId) || days[0];
    }

    function keyFor(dayId, exerciseId, field) {
      return `${storagePrefix}:${dayId}:${exerciseId}:${field}`;
    }

    function isComplete(dayId, exerciseId) {
      return localStorage.getItem(keyFor(dayId, exerciseId, "complete")) === "true";
    }

    function getNote(dayId, exerciseId) {
      return localStorage.getItem(keyFor(dayId, exerciseId, "note")) || "";
    }

    function completionStats(day) {
      if (!day.exercises.length) return { done: 0, total: 0, pct: 0 };
      const done = day.exercises.filter(ex => isComplete(day.id, ex.id)).length;
      const total = day.exercises.length;
      return { done, total, pct: Math.round((done / total) * 100) };
    }

    function renderDayStrip() {
      dayStrip.innerHTML = allDays.map(day => {
        const stats = completionStats(day);
        const isActive = day.id === selectedDayId;
        return `
          <button class="day-tab ${isActive ? "active" : ""}" type="button" data-day="${day.id}" aria-pressed="${isActive}">
            <span class="day">${day.name}</span>
            <span class="focus">${day.focus}</span>
            <span class="mini-progress" aria-hidden="true"><span style="width:${stats.pct}%"></span></span>
          </button>
        `;
      }).join("");
      dayStrip.querySelectorAll(".day-tab").forEach(button => {
        button.addEventListener("click", () => {
          selectedDayId = button.dataset.day;
          localStorage.setItem(`${storagePrefix}:selectedDay`, selectedDayId);
          render();
        });
      });
    }

    function applyTheme(theme) {
      const themeConfig = themes.find(item => item.id === theme) || themes[0];
      selectedTheme = themeConfig.id;
      document.body.dataset.theme = themeConfig.id;
      localStorage.setItem(`${storagePrefix}:theme`, themeConfig.id);
      themeLabel.textContent = themeConfig.name;
      themeCurrentSwatch.style.setProperty("--dot-a", themeConfig.colors[0]);
      themeCurrentSwatch.style.setProperty("--dot-b", themeConfig.colors[1]);
      themeOptions.querySelectorAll("[data-theme]").forEach(button => {
        button.classList.toggle("active", button.dataset.theme === themeConfig.id);
      });
    }

    function bindThemePicker() {
      themeOptions.innerHTML = themes.map(theme => `
        <button class="theme-option" type="button" data-theme="${theme.id}">
          <span class="theme-swatch" style="--dot-a:${theme.colors[0]};--dot-b:${theme.colors[1]}"></span>
          <span>
            <strong>${theme.name}</strong>
            <small>${theme.note}</small>
          </span>
          <span class="active-mark">${icons.check}</span>
        </button>
      `).join("");

      themeOptions.querySelectorAll("[data-theme]").forEach(button => {
        button.addEventListener("click", () => {
          applyTheme(button.dataset.theme);
          themeMenu.removeAttribute("open");
        });
      });

      document.addEventListener("click", event => {
        if (!themeMenu.contains(event.target)) {
          themeMenu.removeAttribute("open");
        }
      });
      applyTheme(selectedTheme);
    }

    function render() {
      clearTimers();
      renderDayStrip();
      renderWorkout(getDay(selectedDayId));
    }

    function renderWorkout(day) {
      if (day.id === "sunday") {
        app.innerHTML = `
          <section class="rest-card panel">
            <div>
              <span class="eyebrow">${icons.shield} Complete Rest</span>
              <h2>Sunday Recovery</h2>
              <p>Full recovery day. No gym training. Let joints, nervous system, and sleep recover so Monday strength work is productive.</p>
            </div>
          </section>
        `;
        return;
      }

      const stats = completionStats(day);
      const warmup = warmups[day.warmup];

      app.innerHTML = `
        <section class="hero">
          <div class="hero-grid">
            <div>
              <span class="eyebrow">${icons.workout} ${day.fullFocus}</span>
              <h2>${day.name}</h2>
              <p class="hero-copy">${day.mainGoal}</p>
            </div>
            <div class="progress-wrap">
              <div class="progress-meta">
                <strong>Today's progress</strong>
                <span id="progressText">${stats.done}/${stats.total} complete</span>
              </div>
              <div class="bar"><span id="progressBar" style="width:${stats.pct}%"></span></div>
              <div class="chip-row">
                <span class="chip good">${icons.clock} ${day.timeBudget}</span>
                <span class="chip warn">${icons.shield} Keep wrist neutral</span>
              </div>
            </div>
          </div>
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">Focus</div><div class="stat-value">${day.fullFocus}</div></div>
            <div class="stat-card"><div class="stat-label">Target</div><div class="stat-value">${day.target}</div></div>
          </div>
        </section>

        <section class="panel">
          <h3>${warmup.title}</h3>
          <div class="chip-row" style="margin-bottom:12px">
            <span class="chip">${icons.clock} ${warmup.time}</span>
            <span class="chip warn">${icons.shield} Wrist neutral above everything</span>
          </div>
          <ul class="list">${warmup.items.map(item => `<li>${item}</li>`).join("")}</ul>
          ${renderWarmupCards(warmup)}
        </section>

        <div class="reset-row">
          <p>Supersets: ${day.supersets.join(" | ")}</p>
          <button class="ghost-btn" type="button" id="resetToday">${icons.reset} Reset today</button>
        </div>

        <section class="exercise-list">
          ${day.exercises.map((ex, index) => renderExerciseCard(day, ex, index)).join("")}
        </section>

        <section class="content-grid" style="margin-top:14px">
          <article class="panel">
            <h3>Wrist Notes</h3>
            <p>${day.wristNotes}</p>
          </article>
          <article class="panel">
            <h3>Exercise Alternatives</h3>
            <ul class="list">${day.alternatives.map(alt => `<li>${alt}</li>`).join("")}</ul>
          </article>
        </section>
      `;

      bindWorkoutEvents(day);
    }

    function renderExerciseCard(day, ex, index) {
      const checked = isComplete(day.id, ex.id);
      const note = escapeHtml(getNote(day.id, ex.id));
      const videoUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(ex.videoQuery)}`;
      const hasWrist = Boolean(ex.wristNote);
      const fallbackImage = illustrationDataUrl(ex, index);
      const imageUrl = exerciseImages[ex.id] || fallbackImage;
      return `
        <article class="exercise-card" data-exercise-card="${ex.id}">
          <div class="exercise-top">
            <div class="exercise-visual">
              <img src="${escapeAttr(imageUrl)}" data-fallback="${escapeAttr(fallbackImage)}" onerror="this.onerror=null;this.src=this.dataset.fallback;" alt="${escapeAttr(ex.name)} exercise image" loading="lazy" decoding="async" referrerpolicy="no-referrer" />
            </div>
            <div class="exercise-body">
              <div class="exercise-title-row">
                <div>
                  <div class="chip-row" style="margin-bottom:8px">
                    <span class="chip">Exercise ${index + 1}</span>
                    ${hasWrist ? `<span class="chip warn">${icons.shield} Wrist-aware</span>` : ""}
                  </div>
                  <h3>${ex.name}</h3>
                </div>
                <label class="complete">
                  <input type="checkbox" data-complete="${ex.id}" ${checked ? "checked" : ""} />
                  Complete
                </label>
              </div>

              <div class="metric-grid">
                <div class="metric"><span>${icons.check} Sets</span><span>${ex.sets}</span></div>
                <div class="metric"><span>${icons.target} Reps</span><span>${ex.reps}</span></div>
                <div class="metric"><span>${icons.clock} Rest</span><span>${ex.rest}</span></div>
                <div class="metric"><span>${icons.flame} RPE</span><span>${ex.rpe}</span></div>
              </div>

              <div class="detail-grid">
                <div class="detail-block">
                  <h4>${icons.target} Form cue</h4>
                  <p>${ex.description}</p>
                </div>
                <div class="detail-block">
                  <h4>${icons.target} Target muscles</h4>
                  <p>${ex.targets}</p>
                </div>
                <div class="detail-block">
                  <h4>${icons.shield} Mistakes to avoid</h4>
                  <ul>${ex.mistakes.map(mistake => `<li>${mistake}</li>`).join("")}</ul>
                </div>
                <div class="detail-block">
                  <h4>${icons.shield} Wrist / alternative</h4>
                  <p>${ex.wristNote || "Keep grip comfortable and wrist neutral."}</p>
                  <p style="margin-top:6px"><strong>Alternative:</strong> ${ex.alternatives}</p>
                </div>
              </div>

              <div class="actions">
                <div class="button-row">
                  <button class="timer-btn" type="button" data-timer="${ex.id}" data-seconds="${ex.timerSeconds}">
                    ${icons.clock} <span data-timer-label="${ex.id}">Start rest (${formatTime(ex.timerSeconds)})</span>
                  </button>
                  <button class="ghost-btn timer-reset-btn" type="button" data-timer-reset="${ex.id}" data-seconds="${ex.timerSeconds}">
                    ${icons.reset} Reset rest
                  </button>
                  <a class="primary-btn" href="${videoUrl}" target="_blank" rel="noopener noreferrer">
                    ${icons.video} Watch form video
                  </a>
                </div>
                <label>
                  <span class="detail-block"><h4>${icons.notes} Notes</h4></span>
                  <textarea data-note="${ex.id}" placeholder="Weight used, reps completed, wrist comfort, form cues...">${note}</textarea>
                </label>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function bindWorkoutEvents(day) {
      document.getElementById("resetToday").addEventListener("click", () => {
        if (!confirm(`Reset completion and notes for ${day.name}?`)) return;
        day.exercises.forEach(ex => {
          localStorage.removeItem(keyFor(day.id, ex.id, "complete"));
          localStorage.removeItem(keyFor(day.id, ex.id, "note"));
          resetTimer(ex.id, ex.timerSeconds);
        });
        render();
      });

      app.querySelectorAll("[data-complete]").forEach(input => {
        input.addEventListener("change", event => {
          const wasComplete = completionStats(day).pct === 100;
          const exId = event.target.dataset.complete;
          localStorage.setItem(keyFor(day.id, exId, "complete"), event.target.checked ? "true" : "false");
          const stats = updateProgress(day);
          renderDayStrip();
          if (!wasComplete && stats.pct === 100) {
            showCelebration(day);
          }
        });
      });

      app.querySelectorAll("[data-note]").forEach(textarea => {
        textarea.addEventListener("input", event => {
          localStorage.setItem(keyFor(day.id, event.target.dataset.note, "note"), event.target.value);
        });
      });

      app.querySelectorAll("[data-timer]").forEach(button => {
        button.addEventListener("click", () => toggleTimer(button.dataset.timer, Number(button.dataset.seconds)));
      });

      app.querySelectorAll("[data-timer-reset]").forEach(button => {
        button.addEventListener("click", () => resetTimer(button.dataset.timerReset, Number(button.dataset.seconds)));
      });
    }

    function updateProgress(day) {
      const stats = completionStats(day);
      document.getElementById("progressText").textContent = `${stats.done}/${stats.total} complete`;
      document.getElementById("progressBar").style.width = `${stats.pct}%`;
      return stats;
    }

    function toggleTimer(id, seconds) {
      const existing = timerIntervals[id];
      if (existing && existing.running) {
        clearInterval(existing.interval);
        existing.running = false;
        setTimerButton(id, existing.remaining, false);
        return;
      }

      const state = existing || { remaining: seconds, running: false, interval: null };
      state.running = true;
      setTimerButton(id, state.remaining, true);
      state.interval = setInterval(() => {
        state.remaining -= 1;
        if (state.remaining <= 0) {
          clearInterval(state.interval);
          state.running = false;
          state.remaining = seconds;
          setTimerButton(id, 0, false, true);
          return;
        }
        setTimerButton(id, state.remaining, true);
      }, 1000);
      timerIntervals[id] = state;
    }

    function resetTimer(id, seconds) {
      const existing = timerIntervals[id];
      if (existing && existing.interval) clearInterval(existing.interval);
      timerIntervals[id] = { remaining: seconds, running: false, interval: null };
      setTimerButton(id, seconds, false);
    }

    function setTimerButton(id, seconds, running, done = false) {
      const label = document.querySelector(`[data-timer-label="${id}"]`);
      const button = document.querySelector(`[data-timer="${id}"]`);
      if (!label || !button) return;
      button.classList.toggle("running", running);
      if (done) {
        label.textContent = "Rest done";
      } else if (running) {
        label.textContent = `Pause (${formatTime(seconds)})`;
      } else {
        label.textContent = `Start rest (${formatTime(seconds)})`;
      }
    }

    function clearTimers() {
      Object.values(timerIntervals).forEach(state => {
        if (state.interval) clearInterval(state.interval);
      });
      timerIntervals = {};
    }

    function showCelebration(day) {
      const existing = document.querySelector(".celebration-overlay");
      if (existing) existing.remove();

      const variant = celebrationTypes[Math.floor(Math.random() * celebrationTypes.length)];
      const overlay = document.createElement("div");
      overlay.className = "celebration-overlay";
      overlay.innerHTML = `
        <div class="celebration-stage celebration-${variant.type}" aria-hidden="true">
          ${renderCelebrationGraphic(variant.type)}
        </div>
        <article class="celebration-copy" role="dialog" aria-modal="true" aria-label="${escapeAttr(variant.title)}">
          <span class="kicker">${day.name} complete</span>
          <h2>${variant.title}</h2>
          <p>${variant.message}</p>
          <button class="ghost-btn celebration-close" type="button" data-close-celebration>${icons.check} Done</button>
        </article>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector("[data-close-celebration]").focus();
      overlay.addEventListener("click", event => {
        if (event.target === overlay || event.target.closest("[data-close-celebration]")) {
          overlay.remove();
        }
      });
      window.setTimeout(() => {
        if (document.body.contains(overlay)) overlay.remove();
      }, 8500);
    }

    function renderCelebrationGraphic(type) {
      if (type === "balloons") {
        return makeBalloons(22) + makeConfetti(34);
      }
      if (type === "fireworks") {
        return makeFireworks(13) + makeSparks(36);
      }
      if (type === "barbell") {
        return `
          ${makeSpeedLines(22)}
          <div class="barbell-celebration">
            <span class="left-a"></span><span class="left-b"></span><span class="right-a"></span><span class="right-b"></span>
          </div>
          ${makeSparks(30)}
        `;
      }
      if (type === "speed") {
        return makeSpeedLines(44) + makeSparks(28);
      }
      if (type === "plates") {
        return makePlateBurst(28) + makeRingWaves(7);
      }
      if (type === "spotlight") {
        return makeSpotlights() + makeStarbursts(34);
      }
      return makeConfetti(74) + makeRingWaves(5);
    }

    function makeConfetti(count) {
      const colors = ["var(--green)", "var(--teal)", "var(--amber)", "var(--steel)", "#ffffff"];
      return Array.from({ length: count }, (_, index) => {
        const x = (index * 37) % 101;
        const drift = ((index % 9) - 4) * 9;
        const color = colors[index % colors.length];
        const duration = 4.2 + (index % 7) * 0.22;
        const delay = -(index % 10) * 0.32;
        const rotate = (index * 29) % 180;
        return `<span class="confetti" style="--x:${x}%;--drift:${drift}vw;--c:${color};--d:${duration}s;--delay:${delay}s;--r:${rotate}deg"></span>`;
      }).join("");
    }

    function makeBalloons(count) {
      const colors = ["var(--green)", "var(--teal)", "var(--amber)", "var(--steel)", "#f7a8ff", "#ff7a59"];
      return Array.from({ length: count }, (_, index) => {
        const x = 4 + ((index * 17) % 92);
        const drift = ((index % 7) - 3) * 6;
        const color = colors[index % colors.length];
        const duration = 5.8 + (index % 6) * 0.34;
        const delay = -(index % 12) * 0.42;
        return `<span class="balloon" style="--x:${x}%;--drift:${drift}vw;--c:${color};--d:${duration}s;--delay:${delay}s"></span>`;
      }).join("");
    }

    function makeSparks(count) {
      const colors = ["var(--green)", "var(--teal)", "var(--amber)", "#ffffff"];
      return Array.from({ length: count }, (_, index) => {
        const x = 5 + ((index * 23) % 90);
        const y = 8 + ((index * 31) % 84);
        const delay = -(index % 8) * 0.18;
        const color = colors[index % colors.length];
        return `<span class="spark" style="--x:${x}%;--y:${y}%;--c:${color};--delay:${delay}s"></span>`;
      }).join("");
    }

    function makeFireworks(count) {
      const colors = ["var(--green)", "var(--teal)", "var(--amber)", "var(--steel)"];
      return Array.from({ length: count }, (_, index) => {
        const x = 10 + ((index * 29) % 82);
        const y = 12 + ((index * 19) % 56);
        const delay = -(index % 6) * 0.36;
        const color = colors[index % colors.length];
        return `<span class="firework" style="--x:${x}%;--y:${y}%;--c:${color};--delay:${delay}s"></span>`;
      }).join("");
    }

    function makeRingWaves(count) {
      const colors = ["var(--green)", "var(--teal)", "var(--amber)", "var(--steel)"];
      return Array.from({ length: count }, (_, index) => {
        const size = 190 + index * 92;
        const delay = index * 0.22;
        const color = colors[index % colors.length];
        return `<span class="ringwave" style="--size:${size}px;--c:${color};--delay:${delay}s"></span>`;
      }).join("");
    }

    function makePlateBurst(count) {
      const colors = ["var(--green)", "var(--teal)", "var(--amber)", "var(--steel)"];
      return Array.from({ length: count }, (_, index) => {
        const rotation = Math.round((360 / count) * index);
        const delay = (index % 6) * 0.045;
        const color = colors[index % colors.length];
        return `<span class="plate-shard" style="--r:${rotation}deg;--c:${color};--delay:${delay}s"></span>`;
      }).join("");
    }

    function makeSpeedLines(count) {
      const colors = ["var(--green)", "var(--teal)", "var(--amber)", "#ffffff"];
      return Array.from({ length: count }, (_, index) => {
        const y = 5 + ((index * 11) % 90);
        const delay = -(index % 8) * 0.16;
        const duration = 1.25 + (index % 6) * 0.13;
        const color = colors[index % colors.length];
        return `<span class="speed-line" style="--y:${y}%;--c:${color};--delay:${delay}s;--d:${duration}s"></span>`;
      }).join("");
    }

    function makeSpotlights() {
      return `
        <span class="spotlight" style="--x:-18vw;--c:var(--green);--delay:0s;--r1:-16deg;--r2:12deg"></span>
        <span class="spotlight" style="--x:18vw;--c:var(--teal);--delay:-0.4s;--r1:14deg;--r2:-10deg"></span>
        <span class="spotlight" style="--x:0vw;--c:var(--amber);--delay:-0.7s;--r1:-7deg;--r2:7deg"></span>
      `;
    }

    function makeStarbursts(count) {
      const colors = ["var(--green)", "var(--teal)", "var(--amber)", "var(--steel)", "#ffffff"];
      return Array.from({ length: count }, (_, index) => {
        const x = 6 + ((index * 19) % 88);
        const y = 7 + ((index * 17) % 86);
        const delay = -(index % 9) * 0.17;
        const color = colors[index % colors.length];
        return `<span class="starburst" style="--x:${x}%;--y:${y}%;--c:${color};--delay:${delay}s"></span>`;
      }).join("");
    }

    function illustrationDataUrl(ex, index) {
      const svg = makeIllustrationSvg(ex, index);
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function warmupFallbackDataUrl(move) {
      const name = escapeSvg(move.name);
      const cue = escapeSvg(move.cue);
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="${name}">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#eef2ec"/>
              <stop offset="100%" stop-color="#d9e0d7"/>
            </linearGradient>
          </defs>
          <rect width="520" height="360" fill="url(#g)"/>
          <circle cx="260" cy="128" r="42" fill="#111412"/>
          <path d="M260 170v76M220 196h80M238 246l-58 58M282 246l58 58" stroke="#111412" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M96 286h328" stroke="#9df05b" stroke-width="14" stroke-linecap="round"/>

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function escapeSvg(value) {
      return String(value).replace(/[&<>]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;"
      })[char]);
    }

    function truncateSvg(value, max) {
      const clean = escapeSvg(value);
      return clean.length > max ? `${clean.slice(0, max - 3)}...` : clean;
    }

    bindThemePicker();
    render();
